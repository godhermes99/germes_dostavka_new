name: germes_dostavka
description: "Додаток доставки їжі Гермес"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  introduction_screen: ^4.0.0
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.12.0
  http: ^1.2.2
  audioplayers: ^5.2.1
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  flutter_local_notifications: ^18.0.1
