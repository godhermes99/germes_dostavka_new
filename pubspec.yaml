  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  map_launcher: ^4.4.3
  geocoding: ^4.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ЦЕЙ БЛОК МИ ДОДАЛИ ТА ВИПРАВИЛИ:
  assets:
    - assets/audio/notification.mp3
